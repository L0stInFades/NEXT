name: windows-dx12u-smoke

on:
  workflow_dispatch:
    inputs:
      smoke_frames:
        description: "Number of DX12U smoke frames to run"
        required: false
        default: "120"

jobs:
  windows-dx12u-smoke:
    runs-on:
      - self-hosted
      - Windows
      - DX12U

    steps:
      - uses: actions/checkout@v6

      - name: Run full DX12U verifier
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Path artifacts -Force | Out-Null
          $frames = [int]"${{ inputs.smoke_frames }}"
          .\scripts\verify_dx12u.ps1 -SmokeFrames $frames 2>&1 |
            Tee-Object -FilePath artifacts\dx12u-smoke.log

      - name: Upload DX12U smoke log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dx12u-smoke-log
          path: artifacts/dx12u-smoke.log
