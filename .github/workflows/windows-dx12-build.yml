name: windows-dx12-build

on:
  push:
    branches:
      - master
      - "rendering/**"
      - "hackops/**"
  pull_request:

jobs:
  windows-dx12-build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Verify Windows DX12U build and shaders
        shell: pwsh
        run: .\scripts\verify_dx12u.ps1 -SkipRuntimeSmoke
