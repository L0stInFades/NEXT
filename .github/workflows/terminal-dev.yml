name: terminal-dev

on:
  push:
    branches:
      - master
      - "hackops/**"
  pull_request:

jobs:
  terminal-dev:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Neovim on Ubuntu
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y neovim

      - name: Install Neovim on macOS
        if: runner.os == 'macOS'
        run: brew install neovim

      - name: Configure terminal preset
        run: cmake --preset terminal-dev

      - name: Build terminal probe
        run: cmake --build --preset terminal-dev

      - name: Run Neovim surface smoke
        run: |
          out/build/terminal-dev/bin/next_nvim_surface_probe \
            --clean \
            --file tools/nvim_surface_probe/sample_policy.py \
            --snapshot /tmp/nvim-surface-ci.txt
          test -s /tmp/nvim-surface-ci.txt

      - name: Run HackOps workspace smoke
        run: |
          out/build/terminal-dev/bin/hackops_demo \
            --reset \
            --workspace /tmp/next-hackops-ci \
            --snapshot ci \
            --run-policy \
            --list | tee /tmp/hackops-policy-ci.txt
          test -f /tmp/next-hackops-ci/policy.py
          test -f /tmp/next-hackops-ci/orders.log
          test -f /tmp/next-hackops-ci/city_graph.json
          test -d /tmp/next-hackops-ci/snapshots
          grep '"route_id": "route.loading-docks"' /tmp/hackops-policy-ci.txt
          printf 'raise SystemExit(7)\n' > /tmp/next-hackops-ci/policy.py
          if out/build/terminal-dev/bin/hackops_demo \
            --workspace /tmp/next-hackops-ci \
            --run-policy > /tmp/hackops-policy-fail-ci.txt; then
            echo "expected policy failure"
            exit 1
          fi
          grep 'policy_exit=7' /tmp/hackops-policy-fail-ci.txt
